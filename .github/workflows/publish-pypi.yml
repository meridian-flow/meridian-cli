name: publish-pypi

on:
  push:
    tags:
      - "v*"

jobs:
  build:
    if: github.event.created == true
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Install uv
        uses: astral-sh/setup-uv@v7

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Build distributions
        run: uv build --no-sources

      - name: Validate wheel artifact
        run: |
          uv run --isolated --no-project --with dist/*.whl meridian --version
          uv run --isolated --no-project --with dist/*.whl meridian doctor

      - name: Validate sdist artifact
        run: |
          uv run --isolated --no-project --with dist/*.tar.gz meridian --version
          uv run --isolated --no-project --with dist/*.tar.gz meridian doctor

      - name: Upload distributions
        uses: actions/upload-artifact@v4
        with:
          name: python-package-distributions
          path: dist/

  publish:
    if: github.event.created == true
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    environment: pypi

    steps:
      - name: Download distributions
        uses: actions/download-artifact@v4
        with:
          name: python-package-distributions
          path: dist/

      - name: Install uv
        uses: astral-sh/setup-uv@v7

      - name: Publish to PyPI
        run: uv publish --trusted-publishing always
